services:
  - type: web
    name: cctv-ai-backend
    rootDir: cctv_ai_backend
    plan: free
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn warehouse_monitoring_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: TWELVE_LABS_API_KEY
        sync: false
